services:
  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_DB: job_search_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d job_search_db"]
      interval: 10s
      retries: 5

  backend:
    build: ./project
    container_name: spring_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/job_search_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
    depends_on:
      db:
        condition: service_healthy  # ← wait for DB to be ready

  frontend:
    build: ../my-frontend  # ← lowercase!
    container_name: react_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend