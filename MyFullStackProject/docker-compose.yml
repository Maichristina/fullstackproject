services:
  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_DB: job_search_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  backend:
    build: ./project
    container_name: spring_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/job_search_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
    depends_on:
      - db

  frontend:
    build: ./MY-FRONTEND # Βεβαιώσου ότι το όνομα του φακέλου είναι σωστό
    container_name: react_frontend
    ports:
      - "5173:5173" # Η θύρα του Vite
    depends_on:
      - backend